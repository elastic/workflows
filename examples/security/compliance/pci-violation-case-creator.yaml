# =============================================================================
# Workflow: PCI Violation Case Creator
# Category: security/compliance
#
# On-demand or scheduled workflow that checks PCI DSS requirements via the
# pci-compliance skill and creates a Kibana case when RED (non-compliant)
# findings are detected. Useful for compliance teams tracking violations
# with full audit trail in Cases.
#
# Author: Elastic
# Created: 2026-05-19
# Tags: Example, Compliance, PCI DSS, Case Management
# =============================================================================
version: "1"
name: PCI Violation Case Creator
description: >
  On-demand or scheduled workflow that checks specific PCI DSS requirements,
  and creates a Kibana case for any RED findings with full evidence and
  remediation actions. Useful for compliance teams that track violations
  as cases for audit trail.
enabled: false
tags:
  - Example
  - Compliance
  - PCI DSS
  - Case Management

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  - type: manual
    inputs:
      - name: requirements
        type: string
        description: >
          Comma-separated PCI requirement IDs to check (e.g. "8.3.4,4.1,2.2.4").
          Use "all" for a full assessment.
        default: all
  - type: scheduled
    with:
      rrule:
        freq: WEEKLY
        interval: 1
        tzid: UTC
        byday:
          - MO
        byhour:
          - 7
        byminute:
          - 0

# ---------------------------------------------------------------------------
# STEPS
# ---------------------------------------------------------------------------
steps:

  # -------------------------------------------------------------------------
  # STEP 1: run_check
  # -------------------------------------------------------------------------
  - name: run_check
    type: ai.agent
    agent-id: elastic-ai-agent
    with:
      message: |
        Run a PCI DSS v4.0.1 compliance check for requirements: {{ inputs.requirements }}.
        Use the pci-compliance skill.

        1. Call pci_scope_discovery first.
        2. Run pci_compliance_check for the specified requirements.
        3. For any RED findings, include the full violation evidence:
           affected entities (usernames, IPs, hostnames), counts, and time ranges.

        Return results as plain text with this structure:

        PCI COMPLIANCE CHECK RESULTS
        Date: <today>
        Requirements checked: {{ inputs.requirements }}
        ================================

        For each requirement checked:
        <STATUS> Req <id> — <name>
        Confidence: <level>
        Evidence: <specific findings if RED>
        Remediation: <action if RED>

        ================================
        RED count: <N>
        If RED count is 0, say: All checked requirements are compliant.
    timeout: 600s
    on-failure:
      continue: true
      retry:
        max-attempts: 2
        delay: 10s

  # -------------------------------------------------------------------------
  # STEP 2: log_check
  # -------------------------------------------------------------------------
  - name: log_check
    type: console
    with:
      message: "PCI check results: {{ steps.run_check.output | json }}"

  # -------------------------------------------------------------------------
  # STEP 3: create_violation_case
  # -------------------------------------------------------------------------
  # Creates a case when the assessment output contains RED findings.
  # -------------------------------------------------------------------------
  - name: create_violation_case
    type: if
    condition: 'steps.run_check.output.message: *RED*'
    steps:
      - name: create_case
        type: cases.createCase
        with:
          description: |
            ## PCI DSS v4.0.1 Compliance Violations Detected

            **Assessment Date:** {{ execution.startedAt }}
            **Requirements Checked:** {{ inputs.requirements }}

            ### Findings

            {{ steps.run_check.output.message }}

            ---
            *Auto-generated by PCI Compliance Workflow. Does not constitute QSA attestation.*
          owner: securitySolution
          settings:
            syncAlerts: false
          severity: high
          tags:
            - pci-compliance
            - automated-assessment
            - violation
          title: "PCI DSS Violation — {{ execution.startedAt | date: '%Y-%m-%d' }}"

      - name: log_case_created
        type: console
        with:
          message: "Case created: {{ steps.create_case.output.id }}"
    else:
      - name: log_all_clear
        type: console
        with:
          message: No RED findings. No case created.
